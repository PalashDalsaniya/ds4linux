# ds4linux daemon configuration
# Place in /etc/ds4linux/ds4linux.conf

[daemon]
# Path to the IPC socket
socket_path = /run/ds4linux.sock

# Default output emulation mode (ds4 only — Xbox removed)
default_output_mode = ds4

# Log level: trace, debug, info, warn, error
log_level = info

[hardware]
# Automatically grab exclusive access to detected controllers
auto_grab = true

# Poll interval for battery status (seconds)
battery_poll_interval = 30

# Enable touchpad-as-mouse by default
touchpad_as_mouse = false
